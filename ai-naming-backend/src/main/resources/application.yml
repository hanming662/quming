server:
  port: 8080

spring:
  application:
    name: ai-naming
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_naming?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# MyBatis Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:/mapper/**/*.xml

# AI Configuration
ai:
  # 支持 OpenAI 兼容格式的API：DeepSeek、硅基流动、阿里云百炼等
  api-key: ${AI_API_KEY:your-api-key-here}
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  model: ${AI_MODEL:deepseek-chat}
  # 流式分片大小（字符数）
  stream-chunk-size: 20

# 小程序配置
wx:
  miniapp:
    appid: ${WX_APPID:your-appid}
    secret: ${WX_SECRET:your-secret}

logging:
  level:
    com.aining: debug
